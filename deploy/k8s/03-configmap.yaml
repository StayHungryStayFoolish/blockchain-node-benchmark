# Blockchain Node Benchmark — ConfigMap (collector settings + env)
# ====================================================================
# v1.3 plan §S4.3: env defaults + non-secret configuration shipped to
# every DaemonSet pod. Real chain credentials (if any) belong in a
# separate Secret, not here.
#
# The DaemonSet sources HOST_PROC/HOST_SYS from this map; user can
# override per-environment by patching this ConfigMap rather than
# editing the DaemonSet spec.
# ====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: blockchain-bench-config
  namespace: blockchain-bench
data:
  # ---- Host filesystem mount paths (must match DaemonSet volumeMounts) ----
  HOST_PROC: "/host/proc"
  HOST_SYS:  "/host/sys"
  HOST_ROOT: "/host"

  # ---- Deployment mode override ----
  # DaemonSet pods are by definition running inside Kubernetes. baseline
  # accepts: vm_bare | vm_systemd | docker | k8s_eks | k8s_gke | k8s_other.
  # We set k8s_gke explicitly here (this ConfigMap ships for GKE). For EKS
  # patch this to "k8s_eks", for other K8s use "k8s_other".
  # Note: monitoring_coordinator.sh checks startswith "k8s" so all three
  # k8s_* variants enable pod_device_mapper and kubelet_stats_client.
  DEPLOYMENT_MODE: "k8s_gke"

  # ---- Cloud provider (will be auto-detected; override for testing) ----
  DEPLOYMENT_PLATFORM: "auto"

  # ---- Sampling interval (seconds between collector polls) ----
  COLLECTION_INTERVAL_SEC: "5"

  # ---- TARGET_CGROUP default (root = whole-node accounting) ----
  # Per-workload Pods can set TARGET_CGROUP=/kubepods.slice/... to attribute
  # IO to a specific Pod. The default of "/" matches host-level iostat.
  TARGET_CGROUP: "/"

  # ---- Logging ----
  # Numeric per utils/unified_logger.sh: DEBUG=0, INFO=1, WARN=2, ERROR=3, FATAL=4.
  # Logger uses arithmetic comparison ([[ $a -lt $b ]]), so passing a literal
  # like "INFO" breaks under set -u (bash treats it as a variable name).
  LOG_LEVEL: "1"
