# Blockchain Node Benchmark — ServiceAccount + RBAC
# ====================================================================
# v1.3 plan §S4.2: minimal RBAC for the monitoring DaemonSet.
#
# Permissions rationale:
#   nodes/proxy   — call kubelet's /stats/summary (S5 task)
#   pods          — discover RPC endpoints + Pod→Container mapping (S5)
#   persistentvolumeclaims — Pod→PVC mapping (S5)
#   persistentvolumes      — PVC→PV→device mapping (S5)
#   namespaces (get/list)  — observability target enumeration
#
# We do NOT request:
#   secrets       — no need; benchmark reads metrics, not credentials
#   deployments/* — no need; we monitor Pods directly
#   write verbs   — read-only monitoring; explicit "verbs: [get, list, watch]"
# ====================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockchain-bench-monitor
  namespace: blockchain-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blockchain-bench-monitor
rules:
  # Read-only Pod / PVC / PV discovery (S5 task)
  - apiGroups: [""]
    resources:
      - pods
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - nodes
      - endpoints  # v1.4.5 round-05 P2: k8s_api_client.list_namespaced_endpoints
                   # calls /api/v1/namespaces/{ns}/endpoints — needed for RPC
                   # service discovery (which Pod IPs back the blockchain RPC svc)
    verbs: ["get", "list", "watch"]
  # kubelet stats/summary access via apiserver proxy (S5 task)
  - apiGroups: [""]
    resources:
      - nodes/proxy
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blockchain-bench-monitor
subjects:
  - kind: ServiceAccount
    name: blockchain-bench-monitor
    namespace: blockchain-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blockchain-bench-monitor
