# Blockchain Node Benchmark — ServiceAccount + RBAC
# ====================================================================
# Minimal RBAC for the monitoring DaemonSet.
#
# Permissions rationale:
#   nodes/proxy   — call kubelet's /stats/summary
#   pods          — discover RPC endpoints + Pod→Container mapping
#   persistentvolumeclaims — Pod→PVC mapping
#   persistentvolumes      — PVC→PV→device mapping
#   namespaces (get/list)  — observability target enumeration
#
# We do NOT request:
#   secrets       — no need; benchmark reads metrics, not credentials
#   deployments/* — no need; we monitor Pods directly
#   write verbs   — read-only monitoring; explicit "verbs: [get, list, watch]"
# ====================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockchain-bench-monitor
  namespace: blockchain-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blockchain-bench-monitor
rules:
  # Read-only Pod / PVC / PV discovery
  - apiGroups: [""]
    resources:
      - pods
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - nodes
      - endpoints  # Needed for RPC service discovery through Kubernetes Endpoints.
    verbs: ["get", "list", "watch"]
  # kubelet stats/summary access via apiserver proxy
  - apiGroups: [""]
    resources:
      - nodes/proxy
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blockchain-bench-monitor
subjects:
  - kind: ServiceAccount
    name: blockchain-bench-monitor
    namespace: blockchain-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blockchain-bench-monitor
