# Optional Prometheus/Grafana stack for blockchain-node-benchmark.
#
# This compose file is intentionally separate from the benchmark runtime. It
# starts only the read-only exporter plus Prometheus/Grafana, and it does not
# start or control benchmark tests.
#
# Usage:
#   docker compose -f deploy/observability/docker-compose.yml up -d
#
# If the benchmark runs in Docker, point MEMORY_SHARE_DIR to a mounted path
# shared with this stack, for example:
#   MEMORY_SHARE_DIR=$(dirname "$PWD")/blockchain-node-benchmark-result/current/memory

services:
  exporter:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ../..:/workspace:ro
      - ${BENCHMARK_DATA_DIR:-../../../blockchain-node-benchmark-result}:/benchmark-data:ro
      - ${BENCHMARK_MEMORY_DIR:-../../../blockchain-node-benchmark-result/current/memory}:/benchmark-memory:ro
    environment:
      BLOCKCHAIN_NODE: ${BLOCKCHAIN_NODE:-solana}
      RPC_MODE: ${RPC_MODE:-mixed}
      PROMETHEUS_EXPORTER_MAX_PROXY_ROWS: ${PROMETHEUS_EXPORTER_MAX_PROXY_ROWS:-20000}
    command:
      - python3
      - /workspace/monitoring/prometheus_exporter.py
      - --listen
      - 0.0.0.0:9108
      - --memory-dir
      - /benchmark-memory
      - --logs-dir
      - /benchmark-data/current/logs
      - --config-dir
      - /workspace/config/chains
      - --chain
      - ${BLOCKCHAIN_NODE:-solana}
      - --rpc-mode
      - ${RPC_MODE:-mixed}
    ports:
      - "${EXPORTER_PORT:-9108}:9108"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    depends_on:
      - exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
