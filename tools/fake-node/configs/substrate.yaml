# fake-node v2 config — substrate family (ADR-0005).
#
# Covers 5 chains under _meta.adapter_family=substrate:
#   polkadot, kusama, acala, astar, moonbeam.
#
# JSON-RPC 2.0 POST namespace_method. Fixtures recorded from polkadot mainnet;
# sister chains share the schema and will get per-chain recorded fixtures in
# step 9 (so kusama/acala/etc. return their own block height etc.).

family: substrate

methods:
  system_chain:
    fixture: system_chain.json
    tier: cheap
  system_health:
    fixture: system_health.json
    tier: cheap
  chain_getFinalizedHead:
    fixture: chain_getFinalizedHead.json
    tier: cheap
  chain_getBlockHash:
    fixture: chain_getBlockHash.json
    tier: cheap
  state_getRuntimeVersion:
    fixture: state_getRuntimeVersion.json
    tier: mid

tiers:
  cheap: 1ms
  mid: 10ms
  expensive: 50ms

io:
  enabled: true
