# fake-node config — Solana
#
# 一份 yaml 描述一条链:
#   - methods: RPC method -> (fixture file, tier)
#   - tiers:   tier -> simulated processing time
#   - io:      non-fixed-frequency disk IO worker config
#
# fixtures 路径相对于 -fixtures-dir 标志.
# 录制方法: 复用 tools/proxy/poc-min/scripts/record_fixtures.sh,
#          或运行: bash tools/fake-node/scripts/record_solana_fixtures.sh

chain: solana

methods:
  getSlot:
    fixture: getSlot.json
    tier: cheap
  getBalance:
    fixture: getBalance.json
    tier: cheap
  getLatestBlockhash:
    fixture: getLatestBlockhash.json
    tier: mid
  getBlock:
    fixture: getBlock.json
    tier: expensive
  getTransaction:
    fixture: getTransaction.json
    tier: expensive

tiers:
  cheap: 1ms
  mid: 10ms
  expensive: 50ms

io:
  enabled: true
  work_dir: /tmp/fake-node-io-solana
  min_bytes: 8192          # 8 KB
  max_bytes: 1048576       # 1 MB
  min_interval_ms: 50
  max_interval_ms: 500
  read_ratio: 0.3          # 30% of cycles read (warm cache), 70% write
