# fake-node v2 config — bitcoin_jsonrpc family
#
# Covers 4 chains under _meta.adapter_family=bitcoin_jsonrpc:
#   bitcoin, bch, dogecoin, litecoin
#
# fixtures stored under fixtures/<chain>/<fixture-name>.json
# (R1: stub config, no smoke wired — full coverage tracked in OQ.)

family: bitcoin_jsonrpc

methods:
  GET /address/{address}:
    fixture: GET__address__address.json
    tier: mid
  GET /address/{address}/balance:
    fixture: GET__address__address_balance.json
    tier: mid
  GET /transaction/address/{address}:
    fixture: GET__transaction_address__address.json
    tier: mid
  estimatesmartfee:
    fixture: estimatesmartfee.json
    tier: cheap
  getblockcount:
    fixture: getblockcount.json
    tier: cheap
  getblockchaininfo:
    fixture: getblockchaininfo.json
    tier: cheap
  getbestblockhash:
    fixture: getbestblockhash.json
    tier: cheap
  getblock:
    fixture: getblock.json
    tier: expensive
  getmempoolinfo:
    fixture: getmempoolinfo.json
    tier: mid
  getnetworkinfo:
    fixture: getnetworkinfo.json
    tier: mid
  getrawtransaction:
    fixture: getrawtransaction.json
    tier: expensive
  getreceivedbyaddress:
    fixture: getreceivedbyaddress.json
    tier: mid

tiers:
  cheap: 1ms
  mid: 10ms
  expensive: 50ms

io:
  enabled: true
  work_dir: /tmp/fake-node-io-bitcoin
  min_bytes: 8192
  max_bytes: 524288        # 512 KB (Bitcoin RPC responses smaller than Solana getBlock)
  min_interval_ms: 100
  max_interval_ms: 1000
  read_ratio: 0.2
